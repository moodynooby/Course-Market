[build]
  command = "pnpm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

# SPA routing - all unknown routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = []
  
  included_files = [".env"]

  [functions."*"]
    node_version = "20"
    memory = 1024
    timeout = 10

[dev]
  command = "vite"
  port = 3000
  target_port = 5173
  framework = "vite"
  auto_launch = true
  envFiles = [".env"]
